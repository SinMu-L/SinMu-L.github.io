<h3 id="获取网址相关"><a href="#获取网址相关" class="headerlink" title="获取网址相关"></a>获取网址相关</h3><figure class="highlight php"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">#测试网址:     http://localhost/blog/testurl.php?id=5</span></span><br><span class="line"></span><br><span class="line"><span class="comment">//获取域名或主机地址 </span></span><br><span class="line"><span class="keyword">echo</span> <span class="variable">$_SERVER</span>[<span class="string">&#x27;HTTP_HOST&#x27;</span>].<span class="string">&quot;&lt;br&gt;&quot;</span>; <span class="comment">#localhost</span></span><br><span class="line"></span><br><span class="line"><span class="comment">//获取网页地址 </span></span><br><span class="line"><span class="keyword">echo</span> <span class="variable">$_SERVER</span>[<span class="string">&#x27;PHP_SELF&#x27;</span>].<span class="string">&quot;&lt;br&gt;&quot;</span>; <span class="comment">#/blog/testurl.php</span></span><br><span class="line"></span><br><span class="line"><span class="comment">//获取网址参数 </span></span><br><span class="line"><span class="keyword">echo</span> <span class="variable">$_SERVER</span>[<span class="string">&quot;QUERY_STRING&quot;</span>].<span class="string">&quot;&lt;br&gt;&quot;</span>; <span class="comment">#id=5</span></span><br><span class="line"></span><br><span class="line"><span class="comment">//获取用户代理 </span></span><br><span class="line"><span class="keyword">echo</span> <span class="variable">$_SERVER</span>[<span class="string">&#x27;HTTP_REFERER&#x27;</span>].<span class="string">&quot;&lt;br&gt;&quot;</span>; </span><br><span class="line"></span><br><span class="line"><span class="comment">//获取完整的url</span></span><br><span class="line"><span class="keyword">echo</span> <span class="string">&#x27;http://&#x27;</span>.<span class="variable">$_SERVER</span>[<span class="string">&#x27;HTTP_HOST&#x27;</span>].<span class="variable">$_SERVER</span>[<span class="string">&#x27;REQUEST_URI&#x27;</span>];</span><br><span class="line"><span class="keyword">echo</span> <span class="string">&#x27;http://&#x27;</span>.<span class="variable">$_SERVER</span>[<span class="string">&#x27;HTTP_HOST&#x27;</span>].<span class="variable">$_SERVER</span>[<span class="string">&#x27;PHP_SELF&#x27;</span>].<span class="string">&#x27;?&#x27;</span>.<span class="variable">$_SERVER</span>[<span class="string">&#x27;QUERY_STRING&#x27;</span>];</span><br><span class="line"><span class="comment">#http://localhost/blog/testurl.php?id=5</span></span><br><span class="line"></span><br><span class="line"><span class="comment">//包含端口号的完整url</span></span><br><span class="line"><span class="keyword">echo</span> <span class="string">&#x27;http://&#x27;</span>.<span class="variable">$_SERVER</span>[<span class="string">&#x27;SERVER_NAME&#x27;</span>].<span class="string">&#x27;:&#x27;</span>.<span class="variable">$_SERVER</span>[<span class="string">&quot;SERVER_PORT&quot;</span>].<span class="variable">$_SERVER</span>[<span class="string">&quot;REQUEST_URI&quot;</span>]; </span><br><span class="line"><span class="comment">#http://localhost:80/blog/testurl.php?id=5</span></span><br><span class="line"></span><br><span class="line"><span class="comment">//只取路径</span></span><br><span class="line"><span class="variable">$url</span>=<span class="string">&#x27;http://&#x27;</span>.<span class="variable">$_SERVER</span>[<span class="string">&#x27;SERVER_NAME&#x27;</span>].<span class="variable">$_SERVER</span>[<span class="string">&quot;REQUEST_URI&quot;</span>]; </span><br><span class="line"><span class="keyword">echo</span> dirname(<span class="variable">$url</span>);</span><br><span class="line"><span class="comment">#http://localhost/blog</span></span><br><span class="line"></span><br></pre></td></tr></table></figure>

<h3 id="stripos-搜索字符串再另一个字符串中的位置"><a href="#stripos-搜索字符串再另一个字符串中的位置" class="headerlink" title="stripos 搜索字符串再另一个字符串中的位置"></a>stripos 搜索字符串再另一个字符串中的位置</h3><figure class="highlight php"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">/**</span></span><br><span class="line"><span class="comment"> * stripos(string,find,start)</span></span><br><span class="line"><span class="comment"> *      string	必需。规定被搜索的字符串。</span></span><br><span class="line"><span class="comment"> *      find	必需。规定要查找的字符。</span></span><br><span class="line"><span class="comment"> *      start	可选。规定开始搜索的位置。</span></span><br><span class="line"><span class="comment"> * </span></span><br><span class="line"><span class="comment"> */</span></span><br><span class="line"></span><br></pre></td></tr></table></figure>
